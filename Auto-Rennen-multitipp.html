<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schwalbkraiburg Tpp2000</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #222;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

.track {
    width: 90%;
    max-width: 900px;
    min-width: 320px;
    height: 55px;
    background: #555;
    margin: 12px auto;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
}

.car {
    position: absolute;
    left: 0;
    top: 10px;
    font-size: 32px;
    transition: left 0.03s linear;
}

.car-number {
    position: absolute;
    left: 10px;
    top: 32px;
    font-size: 14px;
    color: #ddd;
    font-weight: bold;
}

.finish {
    position: absolute;
    right: 5px;
    top: 0;
    bottom: 0;
    width: 4px;
    background: red;
}

button {
    padding: 10px 24px;
    font-size: 18px;
    margin-top: 15px;
    cursor: pointer;
}

select {
    font-size: 18px;
    padding: 6px;
    margin: 0 6px;
    width: 280px;
}

#carChooser {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 10px auto;
    max-width: 520px;
}

.car-choice {
    border: 1px solid #ccc;
    background: #333;
    color: white;
    padding: 10px 14px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    min-width: 120px;
}

.car-choice.selected {
    background: #0a7;
    border-color: #0f9;
}

#result {
    font-size: 24px;
    margin-top: 20px;
    min-height: 32px;
}
</style>
</head>
<body>

<h1>🏁 Bet 2000</h1>
<p>Wähle ein oder mehrere Teilnehmer aus und setze auf das Rennen.</p>

<p>
Spielart:
<select id="gameType">
    <option value="F1">F1</option>
    <option value="Menschen">Menschen</option>
    <option value="Autos">Autos</option>
    <option value="Pferde">Pferde</option>
</select>
</p>

<p>Teilnehmer:</p>
<div id="carChooser"></div>

<p>
Einsatz (Schwalbtahler):
<input id="betAmount" type="number" value="1" min="1">
</p>

<p id="payoutInfo">Wähle Einsatz und Teilnehmer, um den möglichen Gewinn in Schwalbtahlern zu sehen.</p>

<button id="startButton">Rennen starten</button>

<div id="tracks"></div>
<h2 id="result"></h2>

<script>
const gameType = document.getElementById('gameType');
const tracks = document.getElementById('tracks');
const result = document.getElementById('result');
const payoutInfo = document.getElementById('payoutInfo');
const carChooser = document.getElementById('carChooser');
const betAmount = document.getElementById('betAmount');
const startButton = document.getElementById('startButton');
const selectedCars = new Set();

const gameTypes = {
    F1: {
        items: [
            { name: 'Red Bull', icon: '🟠🏎️', color: '#1A73E8' },
            { name: 'Mercedes', icon: '🔵🏎️', color: '#00D2BE' },
            { name: 'Ferrari', icon: '🔴🏎️', color: '#DC0000' },
            { name: 'McLaren', icon: '⚫🏎️', color: '#FF8700' },
            { name: 'Alpine', icon: '⚪🏎️', color: '#1E41FF' },
            { name: 'Aston Martin', icon: '🟡🏎️', color: '#134A29' }
        ]
    },
    Menschen: {
        items: [
            { name: 'Läufer 1', icon: '🧍', color: '#ffb300' },
            { name: 'Läufer 2', icon: '🧍‍♀️', color: '#e91e63' },
            { name: 'Sprinter 1', icon: '🧍‍♂️', color: '#00bcd4' },
            { name: 'Sprinter 2', icon: '🏃', color: '#4caf50' },
            { name: 'Jogger 1', icon: '🚶', color: '#9c27b0' },
            { name: 'Walker 1', icon: '🏃‍♂️', color: '#ff5722' }
        ]
    },
    Autos: {
        items: [
            { name: 'Rennauto', icon: '🚗', color: '#2196f3' },
            { name: 'Limousine', icon: '🚘', color: '#9e9e9e' },
            { name: 'SUV', icon: '🚙', color: '#3f51b5' },
            { name: 'Pick-up', icon: '🛻', color: '#795548' },
            { name: 'Polizei', icon: '🚓', color: '#0d47a1' },
            { name: 'Taxi', icon: '🚕', color: '#fdd835' }
        ]
    },
    Pferde: {
        items: [
            { name: 'Rennpferd 1', icon: '🐎', color: '#795548' },
            { name: 'Rennpferd 2', icon: '🐴', color: '#8d6e63' },
            { name: 'Einhorn', icon: '🦄', color: '#9c27b0' },
            { name: 'Ochse 1', icon: '🐂', color: '#4caf50' },
            { name: 'Hirsch 1', icon: '🦌', color: '#ff9800' },
            { name: 'Kamel 1', icon: '🐪', color: '#ff5722' }
        ]
    }
};

function getCurrentGame() {
    return gameTypes[gameType.value];
}

function renderGame() {
    const current = getCurrentGame();
    tracks.innerHTML = '';
    carChooser.innerHTML = '';
    selectedCars.clear();
    result.textContent = '';
    updatePayoutInfo();

    for (let i = 0; i < current.items.length; i++) {
        const item = current.items[i];
        tracks.innerHTML += `
        <div class="track">
            <div class="car" id="car${i}">${item.icon}</div>
            <div class="car-number">${i + 1}</div>
            <div class="finish"></div>
        </div>
        `;
    }

    for (let i = 0; i < current.items.length; i++) {
        const item = current.items[i];
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'car-choice';
        button.textContent = `${item.name} ${item.icon}`;
        button.dataset.index = i;
        button.addEventListener('click', () => toggleCarSelection(i, button));
        carChooser.appendChild(button);
    }
}

function toggleCarSelection(index, button) {
    if (selectedCars.has(index)) {
        selectedCars.delete(index);
        button.classList.remove('selected');
    } else {
        selectedCars.add(index);
        button.classList.add('selected');
    }
    updatePayoutInfo();
}

function updatePayoutInfo() {
    const count = selectedCars.size;
    const bet = parseInt(betAmount.value, 10);
    if (count === 0 || !bet || bet <= 0) {
        payoutInfo.textContent = 'Wähle Einsatz und Teilnehmer, um den möglichen Gewinn in Schwalbtahlern zu sehen.';
        return;
    }
    const payout = Math.round(bet * 6 / count);
    payoutInfo.textContent = `Bei ${count} Tipp(s) und ${bet} Schwalbtahler Einsatz beträgt der mögliche Gewinn ${payout} Schwalbtahler.`;
}

function startRace() {
    const current = getCurrentGame();
    const chosenIndices = Array.from(selectedCars);
    const bet = parseInt(betAmount.value, 10);

    if (chosenIndices.length === 0) {
        alert('Bitte wähle mindestens einen Teilnehmer aus.');
        return;
    }

    if (!bet || bet <= 0) {
        alert('Bitte gib einen gültigen Einsatz ein.');
        return;
    }

    const payout = Math.round(bet * 6 / chosenIndices.length);
    payoutInfo.textContent = `Bei ${chosenIndices.length} Tipp(s) und ${bet} Schwalbtahler Einsatz beträgt der mögliche Gewinn ${payout} Schwalbtahler.`;

    result.textContent = '';
    startButton.disabled = true;

    const carElements = current.items.map((_, i) => document.getElementById('car' + i));
    const trackElements = Array.from(document.querySelectorAll('.track'));
    const trackWidth = trackElements[0].clientWidth;
    const carWidth = carElements[0].clientWidth;
    const finishX = trackWidth - carWidth - 10;

    let finished = false;
    const positions = current.items.map(() => 0);

    carElements.forEach(car => car.style.left = '0px');

    const interval = setInterval(() => {
        for (let i = 0; i < current.items.length; i++) {
            positions[i] += Math.random() * 8 + 1;
            carElements[i].style.left = positions[i] + 'px';

            if (positions[i] >= finishX && !finished) {
                finished = true;
                clearInterval(interval);
                startButton.disabled = false;

                if (chosenIndices.includes(i)) {
                    result.textContent = `🎉 Teilnehmer ${i + 1} gewinnt! Einer deiner Tipps war richtig.`;
                } else {
                    result.textContent = `❌ Teilnehmer ${i + 1} gewinnt. Deine Tipps lagen daneben.`;
                }
                break;
            }
        }
    }, 30);
}

gameType.addEventListener('change', renderGame);
startButton.addEventListener('click', startRace);

renderGame();
</script>
<p style="margin-top: 20px; color: #ccc; font-size: 14px;">gemacht von Valentin G. 7d</p>
</body>
</html>
