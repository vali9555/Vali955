<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schwalbtahler</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #222;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

.track {
    width: 90%;
    max-width: 900px;
    min-width: 320px;
    height: 55px;
    background: #555;
    margin: 12px auto;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
}

.car {
    position: absolute;
    left: 0;
    top: 10px;
    font-size: 32px;
    transition: left 0.03s linear;
}

.car-number {
    position: absolute;
    left: 10px;
    top: 32px;
    font-size: 14px;
    color: #ddd;
    font-weight: bold;
}

.finish {
    position: absolute;
    right: 5px;
    top: 0;
    bottom: 0;
    width: 4px;
    background: red;
}

button {
    padding: 10px 24px;
    font-size: 18px;
    margin-top: 15px;
    cursor: pointer;
}

select {
    font-size: 18px;
    padding: 6px;
    margin: 0 6px;
    width: 280px;
}

#chooserGroups {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 18px;
    margin: 10px auto;
    max-width: 760px;
}

.group {
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 10px;
    min-width: 180px;
    flex: 1 1 180px;
}

.group-title {
    margin: 0 0 10px;
    font-size: 16px;
    color: #9fdf9f;
}

.car-choice {
    border: 1px solid #ccc;
    background: #333;
    color: white;
    padding: 10px 14px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    min-width: 120px;
    margin: 4px 0;
    width: 100%;
    text-align: left;
}

.car-choice.selected {
    background: #0a7;
    border-color: #0f9;
}

#result {
    font-size: 24px;
    margin-top: 20px;
    min-height: 32px;
}
</style>
</head>
<body>

<h1>🏁 Schalbtahler</h1>
<p>Wähle ein oder mehrere Teilnehmer aus und setze auf das Rennen.</p>

<p>Teilnehmer:</p>
<div id="chooserGroups"></div>

<p>
Einsatz (Schwalbtahler):
<input id="betAmount" type="number" value="1" min="1">
</p>

<p id="payoutInfo">Wähle Einsatz und Teilnehmer, um den möglichen Gewinn in Schwalbtahlern zu sehen.</p>

<button id="startButton">Rennen starten</button>

<div id="tracks"></div>
<h2 id="result"></h2>

<script>
const participantGroups = [
    { title: 'Fahrzeuge', items: [
        { name: 'Auto', icon: '🚗' },
        { name: 'Taxi', icon: '🚘' },
        { name: 'Motorrad', icon: '🏍️' },
        { name: 'Flugzeug', icon: '✈️' }
    ] },
    { title: 'Menschen', items: [
        { name: 'Mensch', icon: '🧍' }
    ] },
    { title: 'Tiere', items: [
        { name: 'Pferd', icon: '🐎' }
    ] }
];
const tracks = document.getElementById('tracks');
const result = document.getElementById('result');
const payoutInfo = document.getElementById('payoutInfo');
const chooserGroups = document.getElementById('chooserGroups');
const betAmount = document.getElementById('betAmount');
const startButton = document.getElementById('startButton');
const selectedParticipants = new Set();

const participants = [];
participantGroups.forEach(group => {
    group.items.forEach(item => participants.push(item));
});

for (let i = 0; i < participants.length; i++) {
    tracks.innerHTML += `
    <div class="track">
        <div class="car" id="car${i}">${participants[i].icon}</div>
        <div class="car-number">${i + 1}</div>
        <div class="finish"></div>
    </div>
    `;
}

participantGroups.forEach(group => {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'group';
    const title = document.createElement('h2');
    title.className = 'group-title';
    title.textContent = group.title;
    groupDiv.appendChild(title);

    group.items.forEach(item => {
        const index = participants.findIndex(part => part === item);
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'car-choice';
        button.textContent = `${item.name} ${item.icon}`;
        button.dataset.index = index;
        button.addEventListener('click', () => toggleParticipantSelection(index, button));
        groupDiv.appendChild(button);
    });

    chooserGroups.appendChild(groupDiv);
});

function toggleParticipantSelection(index, button) {
    if (selectedParticipants.has(index)) {
        selectedParticipants.delete(index);
        button.classList.remove('selected');
    } else {
        selectedParticipants.add(index);
        button.classList.add('selected');
    }
    updatePayoutInfo();
}

function updatePayoutInfo() {
    const count = selectedParticipants.size;
    const bet = parseInt(betAmount.value, 10);
    if (count === 0 || !bet || bet <= 0) {
        payoutInfo.textContent = 'Wähle Einsatz und Teilnehmer, um den möglichen Gewinn in Schwalbtahlern zu sehen.';
        return;
    }
    const payout = Math.round(bet * 6 / count);
    payoutInfo.textContent = `Bei ${count} Tipp(s) und ${bet} Schwalbtahler Einsatz beträgt der mögliche Gewinn ${payout} Schwalbtahler.`;
}

function startRace() {
    const chosenIndices = Array.from(selectedParticipants);
    const bet = parseInt(betAmount.value, 10);

    if (chosenIndices.length === 0) {
        alert('Bitte wähle mindestens einen Teilnehmer aus.');
        return;
    }

    if (!bet || bet <= 0) {
        alert('Bitte gib einen gültigen Einsatz ein.');
        return;
    }

    const payout = Math.round(bet * 6 / chosenIndices.length);
    payoutInfo.textContent = `Bei ${chosenIndices.length} Tipp(s) und ${bet} Schwalbtahler Einsatz beträgt der mögliche Gewinn ${payout} Schwalbtahler.`;

    result.textContent = '';
    startButton.disabled = true;

    const carElements = participants.map((_, i) => document.getElementById('car' + i));
    const trackElements = Array.from(document.querySelectorAll('.track'));
    const trackWidth = trackElements[0].clientWidth;
    const carWidth = carElements[0].clientWidth;
    const finishX = trackWidth - carWidth - 10;

    let finished = false;
    const positions = participants.map(() => 0);

    carElements.forEach(car => car.style.left = '0px');

    const interval = setInterval(() => {
        for (let i = 0; i < participants.length; i++) {
            positions[i] += Math.random() * 8 + 1;
            carElements[i].style.left = positions[i] + 'px';

            if (positions[i] >= finishX && !finished) {
                finished = true;
                clearInterval(interval);
                startButton.disabled = false;

                if (chosenIndices.includes(i)) {
                    result.textContent = `🎉 Teilnehmer ${i + 1} gewinnt! Einer deiner Tipps war richtig.`;
                } else {
                    result.textContent = `❌ Teilnehmer ${i + 1} gewinnt. Deine Tipps lagen daneben.`;
                }
                break;
            }
        }
    }, 30);
}

startButton.addEventListener('click', startRace);
</script>
</body>
</html>
