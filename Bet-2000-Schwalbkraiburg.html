// Attach connect button and try common hosts
document.addEventListener('DOMContentLoaded', ()=>{
    const btn = document.getElementById('wsConnectBtn');
    const input = document.getElementById('wsServerInput');
    if (btn && input) {
        btn.addEventListener('click', ()=>{
            const url = input.value.trim();
            if (!url) return alert('Bitte WebSocket-URL eingeben (z. B. wss://example.com:8080)');
            connectWS(url);
        });
    }
    // try auto-connect to common hosts
    (function autoConnectWS(){
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const candidates = [location.hostname, 'localhost', '127.0.0.1'];
        let i=0;
        function tryNext(){
            if (i>=candidates.length) return;
            const host = candidates[i++];
            const url = `${proto}://${host}:8080`;
            try{
                const tmp = new WebSocket(url);
                const cleanup = ()=>{ try{ tmp.close(); }catch(e){} };
                tmp.onopen = ()=>{ cleanup(); connectWS(url); const inputEl = document.getElementById('wsServerInput'); if (inputEl) inputEl.value = url; };
                tmp.onerror = ()=>{ cleanup(); setTimeout(tryNext,200); };
                setTimeout(()=>{ if (tmp.readyState !== WebSocket.OPEN) { try{ tmp.close(); }catch(e){} tryNext(); } },1000);
            }catch(e){ setTimeout(tryNext,200); }
        }
        tryNext();
    })();
});

<script>
const gameType = document.getElementById('gameType');

const result = document.getElementById('result');
const payoutInfo = document.getElementById('payoutInfo');
// Hinweis: Globaler `carChooser` und `betAmount` entfernt — pro-Spieler Tipps/Einsätze verwendet
const startButton = document.getElementById('startButton');
// global selection removed — players choose their own picks
const playersContainer = document.getElementById('playersContainer');
const winnerInfo = document.getElementById('winnerInfo');

let players = [];
let currentWinner = null;
let raceInterval = null;
window.PRIZE_MULTIPLIER = 3;
// WebSocket-based incoming message handler (remote controllers must authenticate with server)
let wsClient = null;
function handleIncoming(msg) {
    const action = msg.action;
    const payload = msg.payload;
    if (!action) return;
    switch(action) {
        case 'addPlayer':
            if (payload && payload.name) { players.push({ name: payload.name, bet: payload.bet || 1, picks: payload.picks || [], weight: payload.weight || 1 }); renderPlayers(); updatePayoutInfo(); }
            break;
            case 'setMultiplier':
                if (payload && typeof payload.multiplier === 'number') { window.PRIZE_MULTIPLIER = payload.multiplier; }
            break;
        case 'setGameType':
            if (payload && payload.gameType) { gameType.value = payload.gameType; renderGame(); renderPlayers(); }
            break;
        case 'startRace':
            startRace();
            break;
        case 'forceFinish':
            if (typeof payload?.index === 'number') {
                if (raceInterval) { clearInterval(raceInterval); raceInterval = null; }
                const i = payload.index;
                const winners = players.map((p, idx) => ({...p, index: idx})).filter(p => p.picks.includes(i));
                const payout = Math.round(players.reduce((s,p)=>s+(parseInt(p.bet,10)||0),0) * (window.PRIZE_MULTIPLIER||3) / Math.max(1, (new Set(players.flatMap(p=>p.picks))).size));
                currentWinner = { participantIndex: i, winners: winners.map(w=>({name:w.name, index:w.index})), payout };
                if (winners.length>0) { result.textContent = `🎉 Teilnehmer ${i+1} gewinnt!`; showWinnerInfo(winners,payout,i); } else { result.textContent = `❌ Teilnehmer ${i+1} gewinnt. Keine Spieler hatten diesen Tipp.`; showWinnerInfo([],0,i); }
            }
            break;
        case 'editWinnerName':
            if (payload && payload.name) { document.getElementById('editWinnerName').value = payload.name; saveWinnerName(); }
            break;
        case 'setPlayerPicks':
            if (payload && typeof payload.index === 'number' && Array.isArray(payload.picks)) {
                const p = players[payload.index]; if (p) { p.picks = payload.picks.slice(); renderPlayers(); updatePayoutInfo(); }
            }
            break;
        case 'setPlayerWeight':
            if (payload && typeof payload.index === 'number' && typeof payload.weight === 'number') { const pp = players[payload.index]; if (pp) { pp.weight = payload.weight; renderPlayers(); updatePayoutInfo(); } }
            break;
        case 'setPlayerBet':
            if (payload && typeof payload.index === 'number' && typeof payload.bet === 'number') { const p = players[payload.index]; if (p) { p.bet = payload.bet; renderPlayers(); updatePayoutInfo(); } }
            break;
        default:
            console.log('Unknown action', action, payload);
    }
}

const REQUIRED_ADMIN_CODE = '2409';
let adminEnabled = false;
function setAdminState(ok) {
    adminEnabled = !!ok;
    document.getElementById('adminBadge').style.display = ok ? 'inline' : 'none';
    document.getElementById('adminHint').textContent = ok ? 'Code akzeptiert' : '(versteckt)';
}

document.addEventListener('DOMContentLoaded', ()=>{
    const adminToggle = document.getElementById('adminToggle');
    const adminRow = document.getElementById('adminCodeRow');
    const adminSet = document.getElementById('adminCodeSet');
    const adminInput = document.getElementById('adminCodeInput');
    if (adminToggle && adminRow) {
        adminToggle.addEventListener('click', ()=>{ adminRow.style.display = adminRow.style.display === 'none' ? 'block' : 'none'; });
    }
    if (adminSet && adminInput) {
        adminSet.addEventListener('click', ()=>{
            const val = adminInput.value.trim();
            if (val === REQUIRED_ADMIN_CODE) {
                setAdminState(true);
                alert('Admin-Code akzeptiert');
            } else {
                setAdminState(false);
                alert('Falscher Code');
            }
        });
    }
});
function connectWS(url) {
    try {
        if (wsClient) { try { wsClient.close(); } catch(e){} wsClient = null; }
        wsClient = new WebSocket(url);
        const statusEl = document.getElementById('wsStatus');
        wsClient.onopen = () => { console.log('WS connected to', url); if (statusEl) statusEl.textContent = '(verbunden)'; };
        wsClient.onmessage = (ev) => {
            try {
                const msg = JSON.parse(ev.data);
                if (msg) handleIncoming(msg);
            } catch (e) { console.warn('Invalid WS message', e); }
        };
        wsClient.onclose = () => { console.log('WS closed'); if (statusEl) statusEl.textContent = '(nicht verbunden)'; };
        wsClient.onerror = (e) => { console.warn('WS error', e); if (statusEl) statusEl.textContent = '(fehler)'; };
    } catch (e) { console.warn('WebSocket connect failed', e); }
}

// Auto-discover public WS via /public-ws on known hosts and connect automatically
async function discoverAndConnectGame() {
    const candidates = [location.origin.replace(/^https?:/, location.protocol), 'http://localhost:8080', 'http://127.0.0.1:8080'];
    for (const base of candidates) {
        try {
            const url = new URL('/public-ws', base).toString();
            const resp = await fetch(url, { mode: 'cors' });
            if (!resp.ok) continue;
            const data = await resp.json();
            if (data && data.ws) {
                document.getElementById('wsServerInput').value = data.ws;
                connectWS(data.ws);
                return;
            }
        } catch (e) { /* ignore */ }
    }
    // fallback: try previous autoConnectWS approach (local hosts)
}

function addPlayer() {
    const nameInput = document.getElementById('newPlayerName');
    const name = nameInput.value.trim();
    
    if (name === '') {
        alert('Bitte einen Namen eingeben');
        return;
    }

    // Spieler als Objekt: Name, Einsatz, gewählte Tipps (Start-Einsatz 1)
    players.push({ name, bet: 1, picks: [], weight: 1 });
    nameInput.value = '';
    renderPlayers();
    updatePayoutInfo();
}

function removePlayer(index) {
    players.splice(index, 1);
    renderPlayers();
    updatePayoutInfo();
}

function renderPlayers() {
    playersContainer.innerHTML = '';
    const current = getCurrentGame();
    players.forEach((player, index) => {
        const div = document.createElement('div');
        div.className = 'player-item';

        // Build picks checkboxes for current game items
        let picksHtml = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">';
        for (let i = 0; i < current.items.length; i++) {
            const it = current.items[i];
            const checked = player.picks.includes(i) ? 'checked' : '';
            picksHtml += `<label style="font-size:14px;"><input type=\"checkbox\" data-player=\"${index}\" data-index=\"${i}\" ${checked}> ${it.name}</label>`;
        }
        picksHtml += '</div>';

        div.innerHTML = `
            <div style="display:flex;gap:8px;align-items:center;width:100%;">
                <strong style="flex:1">${player.name}</strong>
                <input type="number" min="1" value="${player.bet}" data-player-bet="${index}" style="width:90px;padding:6px;border-radius:4px;background:#444;border:1px solid #555;color:white;"> 
                <input type="number" min="1" value="${player.weight || 1}" data-player-weight="${index}" style="width:70px;padding:6px;border-radius:4px;background:#333;border:1px solid #555;color:#0f9;" disabled title="Gewicht (wird vom Live-Controller gesetzt)"> 
                <button onclick="removePlayer(${index})" style="padding: 4px 8px; font-size: 12px;">Entfernen</button>
            </div>
            ${picksHtml}
        `;

        playersContainer.appendChild(div);
    });

    // Attach event listeners for newly created inputs
    document.querySelectorAll('input[data-player-bet]').forEach(inp => {
        inp.addEventListener('change', (e) => {
            const idx = parseInt(e.target.getAttribute('data-player-bet'), 10);
            players[idx].bet = parseInt(e.target.value, 10) || 1;
            updatePayoutInfo();
        });
    });

    document.querySelectorAll('input[type=checkbox][data-player]').forEach(cb => {
        cb.addEventListener('change', (e) => {
            const p = parseInt(e.target.getAttribute('data-player'), 10);
            const choice = parseInt(e.target.getAttribute('data-index'), 10);
            if (e.target.checked) {
                if (!players[p].picks.includes(choice)) players[p].picks.push(choice);
            } else {
                const pos = players[p].picks.indexOf(choice);
                if (pos >= 0) players[p].picks.splice(pos, 1);
            }
            updatePayoutInfo();
        });
    });
}

function getCurrentGame() {
    return gameTypes[gameType.value];
}

function renderGame() {
    const current = getCurrentGame();
    tracks.innerHTML = '';
    // clear any prior state
    result.textContent = '';
    winnerInfo.classList.remove('show');
    updatePayoutInfo();

    for (let i = 0; i < current.items.length; i++) {
        const item = current.items[i];
        tracks.innerHTML += `
        <div class="track">
            <div class="car" id="car${i}">${item.icon}</div>
            <div class="car-number">${i + 1}</div>
            <div class="finish"></div>
        </div>
        `;
    }

    // participants shown on tracks; per-player picks are in the players area
}

// removed global toggleCarSelection — players pick individually

function updatePayoutInfo() {
    // Compute union of all picks
    const union = new Set();
    let totalBet = 0;
    players.forEach(p => { totalBet += (parseInt(p.bet, 10) || 0); p.picks.forEach(x => union.add(x)); });
    const count = union.size;
    if (count === 0 || totalBet === 0 || players.length === 0) {
        payoutInfo.textContent = 'Wähle Spieler, Einsatz und Teilnehmer, um den möglichen Gewinn in Schwalbtahlern zu sehen.';
        return;
    }
    const payout = Math.round(totalBet * (window.PRIZE_MULTIPLIER||3) / count);

    // Show summary + per-player potential
    let summary = `Gesamteinsätze: ${totalBet} Schwalbtahler · ${count} getippte Teilnehmer · Gewinn pro richtiger Tipp: ${payout} Schwalbtahler.`;
    summary += '\n';
    players.forEach(p => {
        const picksText = p.picks.map(i => getCurrentGame().items[i].name).join(', ') || '—';
        summary += `${p.name}: Einsatz ${p.bet} · Tipps: ${picksText} \n`;
    });
    payoutInfo.textContent = summary;
}

function startRace() {
    const current = getCurrentGame();
    // per-player picks and bets are used; global selections removed

    if (players.length === 0) {
        alert('Bitte füge mindestens einen Spieler hinzu.');
        return;
    }

    // Validate: at least one player has at least one pick
    const anyPick = players.some(p => p.picks && p.picks.length > 0);
    if (!anyPick) {
        alert('Bitte lasse jeden Spieler mindestens einen Tipp setzen.');
        return;
    }

    // Recompute totalBet from players and union of picks
    const union = new Set();
    let totalBet = 0;
    players.forEach(p => { totalBet += (parseInt(p.bet,10) || 0); p.picks.forEach(x => union.add(x)); });
    const uniqueCount = union.size || 0;
    const payout = uniqueCount > 0 ? Math.round(totalBet * (window.PRIZE_MULTIPLIER||3) / uniqueCount) : 0;
    payoutInfo.textContent = `Gesamteinsätze: ${totalBet} · ${uniqueCount} getippte Teilnehmer · Gewinn pro richtiger Tipp: ${payout} Schwalbtahler.`;

    result.textContent = '';
    startButton.disabled = true;
    winnerInfo.classList.remove('show');

    const carElements = current.items.map((_, i) => document.getElementById('car' + i));
    const trackElements = Array.from(document.querySelectorAll('.track'));
    const trackWidth = trackElements[0].clientWidth;
    const carWidth = carElements[0].clientWidth;
    const finishX = trackWidth - carWidth - 10;

    let finished = false;
    const positions = current.items.map(() => 0);

    carElements.forEach(car => car.style.left = '0px');

    const interval = setInterval(() => {
        for (let i = 0; i < current.items.length; i++) {
            positions[i] += Math.random() * 8 + 1;
            carElements[i].style.left = positions[i] + 'px';

            if (positions[i] >= finishX && !finished) {
                finished = true;
                clearInterval(interval);
                startButton.disabled = false;

                // Determine which players predicted this participant
                const winners = players.map((p, idx) => ({...p, index: idx})).filter(p => p.picks.includes(i));

                currentWinner = {
                    participantIndex: i,
                    winners: winners.map(w => ({ name: w.name, index: w.index })),
                    payout: payout
                };

                if (winners.length > 0) {
                    result.textContent = `🎉 Teilnehmer ${i + 1} gewinnt!`;
                    showWinnerInfo(winners, payout, i);
                } else {
                        // If no player predicted the winner, choose a player by weight
                        function weightedRandomIndex(arr) {
                            const total = arr.reduce((s,p)=>s+(p.weight||1),0);
                            let r = Math.random() * total;
                            for (let k=0;k<arr.length;k++){
                                r -= (arr[k].weight||1);
                                if (r <= 0) return k;
                            }
                            return arr.length - 1;
                        }
                        const randomPlayerIndex = weightedRandomIndex(players);
                        const winnerPlayerName = players[randomPlayerIndex].name;
                        result.textContent = `❌ Teilnehmer ${i + 1} gewinnt. Keine Spieler hatten diesen Tipp.`;
                        showWinnerInfo([], 0, i, winnerPlayerName);
                }
                break;
            }
        }
    }, 30);
}

function showWinnerInfo(winners, payout, participantIndex, fallbackName) {
    const display = document.getElementById('winnerDisplayName');
    const winningsEl = document.getElementById('winnings');
    const editInput = document.getElementById('editWinnerName');

    if (winners && winners.length > 0) {
        // List all winning players and their payout
        const names = winners.map(w => w.name).join(', ');
        display.textContent = `${getCurrentGame().items[participantIndex].name} gewinnt! Gewinner: ${names}`;
        winningsEl.textContent = `Gewinn pro richtiger Tipp: ${payout} Schwalbtahler`;
        editInput.value = winners[0].name;
    } else {
        display.textContent = `${getCurrentGame().items[participantIndex].name} gewinnt!`;
        winningsEl.textContent = `Gewinn: ${payout} Schwalbtahler`;
        editInput.value = fallbackName || '';
    }
    winnerInfo.classList.add('show');
}

function saveWinnerName() {
    const newName = document.getElementById('editWinnerName').value.trim();
    if (newName === '') {
        alert('Bitte einen Namen eingeben');
        return;
    }
    // Update first winner display name if exists
    if (currentWinner && currentWinner.winners && currentWinner.winners.length > 0) {
        // Update in currentWinner and persist to players array
        const w = currentWinner.winners[0];
        currentWinner.winners[0].name = newName;
        if (typeof w.index === 'number' && players[w.index]) {
            players[w.index].name = newName;
        }
        document.getElementById('winnerDisplayName').textContent = `${newName} gewinnt!`;
        renderPlayers();
    } else {
        // Fallback label (no player to persist to)
        document.getElementById('winnerDisplayName').textContent = `${newName} gewinnt!`;
    }
}

gameType.addEventListener('change', () => { renderGame(); renderPlayers(); });
startButton.addEventListener('click', startRace);

renderGame();
renderPlayers();
</script>
